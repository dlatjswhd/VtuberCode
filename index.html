
<!DOCTYPE html>
<html lang="en">
<head>

        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "vu4avbco5e");

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTuber Promotion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1 data-i18n="vtuber-name">VTuber Name</h1>
            <div class="language-selector">
                <select id="lang-select">
                    <option value="ko">한국어</option>
                    <option value="en" selected>English</option>
                </select>
            </div>
        </div>
        <nav>
            <ul>
                <li><a href="#about" data-i18n="nav-about">About</a></li>
                <li><a href="#videos" data-i18n="nav-videos">Videos</a></li>
                <li><a href="#schedule" data-i18n="nav-schedule">Schedule</a></li>
                <li><a href="#social" data-i18n="nav-social">Social</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="about">
            <vtuber-profile id="profile" name="VTuber Name" description="A brief and engaging description of the VTuber."></vtuber-profile>
        </section>

        <section id="videos">
            <h2 data-i18n="header-videos">Latest Videos</h2>
            <div class="video-gallery">
                </div>
        </section>

        <section id="schedule">
            <h2 data-i18n="header-schedule">Streaming Schedule</h2>
            <div class="schedule-container">
                </div>
        </section>
        <section id="contact">
            <h2 data-i18n="header-contact">Contact for Business</h2>
            <div class="contact-container">
                <form action="https://formspree.io/f/mdawgazb" method="POST" id="contact-form">
                    <div class="form-group">
                        <label for="email" data-i18n="label-email">Your Email:</label>
                        <input type="email" name="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="message" data-i18n="label-message">Your Message:</label>
                        <textarea name="message" id="message" required></textarea>
                    </div>
                    <button type="submit" data-i18n="btn-submit">Send</button>
                </form>
            </div>
        </section>
    </main>

    <footer id="social">
        <h2 data-i18n="header-social">Follow Me!</h2>
        <div class="social-links">
            </div>
    </footer>

    <script src="main.js" type="module"></script>
</body>
</html>
