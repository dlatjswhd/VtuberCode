    <meta charset="UTF-8" />
    <title>Open-LLM-Vtuber - Live Streaming</title>
    <!-- Check if libs are loaded -->
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        const checkLibs = () => {
          const live2dLoaded = typeof window.Live2DCubismCore !== 'undefined';
          console.log(`[Library Check] Live2D Cubism Core: ${live2dLoaded ? '✅ Loaded' : '❌ NOT LOADED'}`);
          if (!live2dLoaded) {
            console.error('Critical: Live2DCubismCore is missing! Character will not render.');
          }
        };
        setTimeout(checkLibs, 2000);
      });
    </script>
    <script type="module" crossorigin src="./assets/main-CKgUHFa9.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/main-QEkl09-0.css">
    <link rel="stylesheet" href="./assets/custom.css">
  </head>

  <body>
    <div id="root"></div>

    <!-- Connection Status Overlay -->
    <div id="status-overlay" class="status-overlay status-connecting">
      서버 연결 중...
    </div>

    <!-- New Custom Chat System Overlay -->
    <div class="new-ui-container">
      <div class="chat-feed-container">
        <div id="chat-messages" class="chat-messages">
          <!-- Messages will appear here -->
        </div>
      </div>
      <div class="input-bar">
        <input type="text" id="chat-input" placeholder="메시지를 입력하세요..." autocomplete="off">
        <button id="send-btn">전송</button>
      </div>
    </div>

    <script>
      // Custom Chat Logic - Enhanced for Cloudflare Tunnel & Debugging
      (function() {
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const statusOverlay = document.getElementById('status-overlay');
        let socket = null;
        let reconnectTimer = null;
        
        const SERVER_HOST = 'bristol-minister-dis-perl.trycloudflare.com';
        const ENDPOINTS = ['/client-ws', '/ws'];
        let currentEndpointIndex = 0;

        function updateStatus(state, text) {
          statusOverlay.innerText = text;
          statusOverlay.className = 'status-overlay status-' + state;
          console.log(`[Status] ${text}`);
        }

        function addMessage(username, text, isAI = false) {
          const msgDiv = document.createElement('div');
          msgDiv.className = 'chat-msg';
          if (isAI) msgDiv.style.borderLeft = '4px solid #9147ff';
          
          msgDiv.innerHTML = `
            <span class="username">${username}</span>
            <span class="text">${text}</span>
          `;
          chatMessages.appendChild(msgDiv);
          chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function connectWS() {
          if (reconnectTimer) clearTimeout(reconnectTimer);
          
          const protocol = 'wss://'; 
          const endpoint = ENDPOINTS[currentEndpointIndex];
          const wsUrl = protocol + SERVER_HOST + endpoint;

          updateStatus('connecting', '서버 연결 시도 중...');
          
          try {
            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
              updateStatus('connected', '연결됨 (Secure)');
              addMessage('System', '스트리밍 서버에 연결되었습니다.');
              currentEndpointIndex = 0;
            };

            socket.onmessage = (event) => {
              console.log('[WebSocket Data Received]', event.data); // Log all incoming data
              try {
                const data = JSON.parse(event.data);
                if (data.type === 'full-text' || data.type === 'text-chunk') {
                  if (data.text && data.text.trim()) {
                    if (data.type === 'full-text') {
                      addMessage('VTuber', data.text, true);
                    }
                  }
                }
              } catch (e) {
                console.error('[WebSocket] Data Parse Error:', e);
              }
            };

            socket.onerror = (error) => {
              updateStatus('failed', '연결 실패');
              console.error('[WebSocket] Error:', error);
            };

            socket.onclose = (event) => {
              updateStatus('failed', '연결 끊김 (재연결 중...)');
              currentEndpointIndex = (currentEndpointIndex + 1) % ENDPOINTS.length;
              reconnectTimer = setTimeout(connectWS, 3000);
            };
          } catch (e) {
            console.error('[WebSocket] Exception:', e);
            reconnectTimer = setTimeout(connectWS, 3000);
          }
        }

        function sendMessage() {
          const text = chatInput.value.trim();
          if (text && socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({
              type: 'text-input',
              text: text
            }));
            addMessage('나', text);
            chatInput.value = '';
          }
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') sendMessage();
        });

        connectWS();
      })();
    </script>
  </body>
</html>
