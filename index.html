
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTuber Promotion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>VTuber Name</h1>
        <nav>
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#videos">Videos</a></li>
                <li><a href="#schedule">Schedule</a></li>
                <li><a href="#social">Social</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="about">
            <vtuber-profile name="VTuber Name" description="A brief and engaging description of the VTuber."></vtuber-profile>
        </section>

        <section id="videos">
            <h2>Latest Videos</h2>
            <div class="video-gallery">
                </div>
        </section>

        <section id="schedule">
            <h2>Streaming Schedule</h2>
            <div class="schedule-container">
                </div>
        </section>
    </main>

    <footer id="social">
        <h2>Follow Me!</h2>
        <div class="social-links">
            </div>
    </footer>

    <script src="main.js" type="module"></script>
</body>
</html>
