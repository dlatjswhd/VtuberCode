    <meta charset="UTF-8" />
    <title>Open-LLM-Vtuber - Live Streaming</title>
    <script type="module" crossorigin src="./assets/main-CKgUHFa9.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/main-QEkl09-0.css">
    <link rel="stylesheet" href="./assets/custom.css">
  </head>

  <body>
    <div id="root"></div>

    <!-- New Custom Chat System Overlay -->
    <div class="new-ui-container">
      <div class="chat-feed-container">
        <div id="chat-messages" class="chat-messages">
          <!-- Messages will appear here -->
          <div class="chat-msg">
            <span class="username">System</span>
            <span class="text">Connecting to Live Streaming system...</span>
          </div>
        </div>
      </div>
      <div class="input-bar">
        <input type="text" id="chat-input" placeholder="Enter message to VTuber..." autocomplete="off">
        <button id="send-btn">SEND</button>
      </div>
    </div>

    <script>
      // Custom Chat Logic - Enhanced for Cloudflare Tunnel & Debugging
      (function() {
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        let socket = null;
        let reconnectTimer = null;
        
        // Configuration
        const SERVER_HOST = 'bristol-minister-dis-perl.trycloudflare.com';
        const ENDPOINTS = ['/client-ws', '/ws']; // Try multiple common endpoints if needed
        let currentEndpointIndex = 0;

        function addMessage(username, text, isAI = false) {
          const msgDiv = document.createElement('div');
          msgDiv.className = 'chat-msg';
          if (isAI) msgDiv.style.borderLeft = '4px solid #9147ff';
          
          msgDiv.innerHTML = `
            <span class="username">${username}</span>
            <span class="text">${text}</span>
          `;
          chatMessages.appendChild(msgDiv);
          chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function connectWS() {
          if (reconnectTimer) clearTimeout(reconnectTimer);
          
          const protocol = window.location.protocol === 'https:' ? 'wss://' : 'wss://'; // Force WSS for Cloudflare
          const endpoint = ENDPOINTS[currentEndpointIndex];
          const wsUrl = protocol + SERVER_HOST + endpoint;

          console.log(`%c[WebSocket] Connecting... %c${wsUrl}`, "color: yellow; font-weight: bold", "color: gray");
          
          try {
            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
              console.log('%c[WebSocket] Connected!', "color: green; font-weight: bold");
              addMessage('System', 'Connected to Live Stream! (WSS Secure)');
              currentEndpointIndex = 0; // Reset index on success
            };

            socket.onmessage = (event) => {
              try {
                const data = JSON.parse(event.data);
                if (data.type === 'full-text' || data.type === 'text-chunk') {
                  if (data.text && data.text.trim()) {
                    if (data.type === 'full-text') {
                      addMessage('VTuber', data.text, true);
                    }
                  }
                }
              } catch (e) {
                console.error('[WebSocket] Data Parse Error:', e);
              }
            };

            socket.onerror = (error) => {
              console.error('%c[WebSocket] Connection Failed', "color: red; font-weight: bold", error);
            };

            socket.onclose = (event) => {
              console.log('%c[WebSocket] Closed. Code: ' + event.code, "color: orange");
              
              // Rotate endpoints on failure
              currentEndpointIndex = (currentEndpointIndex + 1) % ENDPOINTS.length;
              
              addMessage('System', 'Connection lost. Retrying in 3s...');
              reconnectTimer = setTimeout(connectWS, 3000);
            };
          } catch (e) {
            console.error('[WebSocket] Setup Exception:', e);
            reconnectTimer = setTimeout(connectWS, 3000);
          }
        }

        function sendMessage() {
          const text = chatInput.value.trim();
          if (text && socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({
              type: 'text-input',
              text: text
            }));
            addMessage('You', text);
            chatInput.value = '';
          } else {
            console.warn('[WebSocket] Cannot send: Socket not connected');
          }
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') sendMessage();
        });

        // Initial connection
        connectWS();
      })();
    </script>
  </body>
</html>
